<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Security Policies (Anti-Hacker) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https: http:; connect-src 'self' https: http: wss:; frame-ancestors 'none';">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <!-- LCP Optimization (Preload Hero Image) -->
    <link rel="preload" as="image" href="/sobre-sonus.webp" fetchpriority="high">
    
    <!-- Primary Meta Tags -->
    <title>Sonus | Soluções em Áudio e Vídeo Profissional</title>
    <meta name="title" content="Sonus | Soluções em Áudio e Vídeo Profissional" />
    <meta name="description" content="Especialistas em projetos de integração audiovisual de alta performance, automação de salas de reunião e acústica para igrejas. 25 anos de experiência no mercado corporativo." />
    <meta name="keywords" content="integração audiovisual, sonorização corporativa, automação de salas de reunião, sistemas de videoconferência, instalação Q-SYS, microfonação Shure, projetos acústicos para igrejas, áudio profissional" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sonusproaudio.com.br/" />
    <meta property="og:title" content="Sonus | Projetos de Som e Video Automatizados" />
    <meta property="og:description" content="Há 28 anos transformando auditórios, igrejas e empresas com tecnologia audiovisual premium." />
    <meta property="og:image" content="https://sonusproaudio.com.br/sobre-sonus.jpg" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">

          "@type": "Organization",

          "name": "Sonus Automação e Áudio Profissional",

          "logo": "https://sonusproaudio.com.br/favicon.svg",
          "contactPoint": {
            "@type": "ContactPoint",
            "telephone": "+55-46-3523-7192",
            "contactType": "customer service",
            "areaServed": "BR",
            "availableLanguage": "Portuguese"
          }
        },
        {
          "@type": "LocalBusiness",
          "@id": "https://sonusproaudio.com.br/#localBusiness",
          "name": "Sonus - Soluções Audiovisuais",
          "image": "https://sonusproaudio.com.br/sobre-sonus.jpg",
          "telephone": "+55 46 3523-7192",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Francisco Beltrão",
            "addressRegion": "PR",
            "addressCountry": "BR"
          },
          "geo": {

          },

        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
